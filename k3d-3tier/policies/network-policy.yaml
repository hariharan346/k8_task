#===============================================================
# Network Policies for three-tier namespace
# Strategy: Default deny all, then explicitly allow needed flows.
#===============================================================

# 1. Default Deny All Ingress + Egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: three-tier
spec:
  podSelector: {}          # Applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress

---

# 2. Allow DNS egress for all pods (kube-dns in kube-system)
#    Without this, pods cannot resolve service names.

#like dns system
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: three-tier
spec:
  podSelector: {}          # All pods
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}   # any namespace (kube-system)
      ports:
        - protocol: UDP #for small requests
          port: 53
        - protocol: TCP #for large requests 
          port: 53

---

# 3. Frontend → Backend (egress from frontend, ingress to backend)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-egress-to-backend
  namespace: three-tier
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 8080

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress-from-frontend
  namespace: three-tier
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8080

---

# 4. Backend → DB (egress from backend, ingress to db)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-egress-to-db
  namespace: three-tier
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: db
      ports:
        - protocol: TCP
          port: 3306

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-ingress-from-backend
  namespace: three-tier
spec:
  podSelector:
    matchLabels:
      app: db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 3306
