apiVersion: v1
kind: Pod
metadata:
  name: db
  namespace: three-tier
  labels:
    app: db
    tier: db
spec:
  # Schedule only on nodes labeled tier=db
  nodeSelector:
    tier: db
  containers:
    - name: db
      image: busybox:1.36
      command: ["sh", "-c", "nc -lk -p 3306 -e echo 'DB OK' & sleep 3600"]
      ports:
        - containerPort: 3306
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: db-svc
  namespace: three-tier
  labels:
    app: db
spec:
  type: ClusterIP
  selector:
    app: db
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
