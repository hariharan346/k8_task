apiVersion: v1
kind: Pod
metadata:
  name: db
  namespace: three-tier
  labels:
    app: db
    tier: db
spec:

  containers:
    - name: db
      image: busybox:1.36
      command: ["sh", "-c", "while true; do echo -e 'HTTP/1.1 200 OK\r\n\r\nDB OK' | nc -l -p 3306; done & sleep infinity"]
      ports:
        - containerPort: 3306
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: db-svc
  namespace: three-tier
  labels:
    app: db
spec:
  type: ClusterIP
  selector:
    app: db
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
